name: Argus Security Scan

on:
  schedule:
    - cron: '0 2 * * 0'  # Каждое воскресенье в 2:00
  workflow_dispatch:       # Ручной запуск

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Argus
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nmap curl sqlmap python3 openssl
      
      - name: Run Argus Scan
        run: |
          chmod +x argus.sh argus
          SCOPE="testphp.vulnweb.com" ./argus scan http://testphp.vulnweb.com
      
      - name: Generate Professional Report
        run: |
          chmod +x argus_report_pro.sh
          ./argus_report_pro.sh
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: ~/argus_scan_*/professional_report.html
